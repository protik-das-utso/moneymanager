<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Money Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #64748b;
            --light: #f1f5f9;
            --border: #e2e8f0;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }

        .loader-overlay.hidden {
            display: none;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--dark);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: var(--dark);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: var(--primary);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .nav-btn.secondary {
            background: var(--light);
            color: var(--dark);
        }

        .nav-btn.secondary:hover {
            background: var(--border);
            box-shadow: none;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .filter-title {
            font-size: 1.2rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-title i {
            color: var(--primary);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--gray);
            font-size: 0.85rem;
        }

        .filter-group input,
        .filter-group select {
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--secondary), #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .summary-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .summary-icon.income {
            background: rgba(16, 185, 129, 0.15);
            color: var(--secondary);
        }

        .summary-icon.expense {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .summary-icon.balance {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
        }

        .summary-icon.count {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .summary-info {
            flex: 1;
        }

        .summary-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
        }

        /* Transactions List */
        .transactions-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .transactions-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .transactions-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .transactions-count {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .transactions-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .transaction-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--light);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.2s;
        }

        .transaction-item:hover {
            background: var(--light);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .transaction-details {
            flex: 1;
        }

        .transaction-name {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .transaction-meta {
            font-size: 0.85rem;
            color: var(--gray);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .transaction-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .transaction-amount.income {
            color: var(--secondary);
        }

        .transaction-amount.expense {
            color: var(--danger);
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1rem;
        }

        /* Filter Toggle Button */
        .filter-toggle-btn {
            display: none;
            padding: 12px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            gap: 8px;
            align-items: center;
            width: 100%;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-toggle-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .filter-section.minimized {
            padding: 15px;
        }

        .filter-section.minimized .filter-grid,
        .filter-section.minimized .filter-actions {
            display: none;
        }

        .filter-section.minimized .filter-header {
            margin-bottom: 0;
        }

        /* Export Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header i {
            color: var(--primary);
        }

        .export-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .export-option {
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .export-option:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .export-option i {
            font-size: 2rem;
            color: var(--primary);
        }

        .export-option-title {
            font-weight: 600;
            color: var(--dark);
        }

        .export-option-desc {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-actions .btn-primary {
            background: var(--primary);
            color: white;
        }

        .modal-actions .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .modal-actions .btn-secondary {
            background: var(--light);
            color: var(--dark);
        }

        .modal-actions .btn-secondary:hover {
            background: var(--border);
        }

        /* Pagination */
        .pagination {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .page-btn {
            padding: 8px 15px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .page-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .page-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .filter-toggle-btn {
                display: flex;
            }

            .filter-section {
                padding: 15px;
            }

            .filter-section.minimized {
                padding: 15px;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }

            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .summary-card {
                padding: 15px;
            }

            .summary-value {
                font-size: 1.2rem;
            }

            .transaction-item {
                padding: 12px 15px;
            }

            .transaction-meta {
                flex-direction: column;
                gap: 5px;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }

            .modal-header {
                font-size: 1.3rem;
            }

            .export-options {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }

            .nav-buttons {
                width: 100%;
            }

            .nav-btn {
                flex: 1;
                justify-content: center;
                font-size: 0.8rem;
                padding: 8px 12px;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .modal-content {
                width: 100%;
                border-radius: 12px 12px 0 0;
                max-height: 90vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Loader -->
    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading transactions...</div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-exchange-alt"></i> Transactions</h1>
            <div class="nav-buttons">
                <a href="/dashboard" class="nav-btn secondary">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </a>
                <button class="nav-btn" onclick="openExportModal()">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
        </header>

        <!-- Export Modal -->
        <div id="exportModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <i class="fas fa-file-export"></i>
                    Export Transactions
                </div>
                <div class="export-options">
                    <div class="export-option" onclick="exportCSV()">
                        <i class="fas fa-file-csv"></i>
                        <div class="export-option-title">CSV/Excel</div>
                        <div class="export-option-desc">Download as CSV file</div>
                    </div>
                    <div class="export-option" onclick="exportPDF()">
                        <i class="fas fa-file-pdf"></i>
                        <div class="export-option-title">PDF</div>
                        <div class="export-option-desc">Download as PDF file</div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeExportModal()">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section" id="filterSection">
            <button class="filter-toggle-btn" id="filterToggleBtn" onclick="toggleFilterSection()">
                <i class="fas fa-chevron-down"></i> Show Filters
            </button>
            <div class="filter-header">
                <div class="filter-title">
                    <i class="fas fa-filter"></i> Filters
                </div>
            </div>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Type</label>
                    <select id="typeFilter">
                        <option value="all">All Transactions</option>
                        <option value="income">Income Only</option>
                        <option value="expense">Expense Only</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Category</label>
                    <select id="categoryFilter">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label>End Date</label>
                    <input type="date" id="endDate">
                </div>
                <div class="filter-group">
                    <label>Search</label>
                    <input type="text" id="searchQuery" placeholder="Search by note...">
                </div>
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="sortBy">
                        <option value="date-desc">Date (Newest First)</option>
                        <option value="date-asc">Date (Oldest First)</option>
                        <option value="amount-desc">Amount (High to Low)</option>
                        <option value="amount-asc">Amount (Low to High)</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button class="btn btn-primary" onclick="applyFilters()">
                    <i class="fas fa-search"></i> Apply Filters
                </button>
                <button class="btn btn-secondary" onclick="resetFilters()">
                    <i class="fas fa-redo"></i> Reset
                </button>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-icon income">
                    <i class="fas fa-arrow-down"></i>
                </div>
                <div class="summary-info">
                    <div class="summary-label">Total Income</div>
                    <div class="summary-value" id="summaryIncome">৳0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon expense">
                    <i class="fas fa-arrow-up"></i>
                </div>
                <div class="summary-info">
                    <div class="summary-label">Total Expense</div>
                    <div class="summary-value" id="summaryExpense">৳0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon balance">
                    <i class="fas fa-balance-scale"></i>
                </div>
                <div class="summary-info">
                    <div class="summary-label">Net Balance</div>
                    <div class="summary-value" id="summaryBalance">৳0</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon count">
                    <i class="fas fa-list-ol"></i>
                </div>
                <div class="summary-info">
                    <div class="summary-label">Total Transactions</div>
                    <div class="summary-value" id="summaryCount">0</div>
                </div>
            </div>
        </div>

        <!-- Transactions List -->
        <div class="transactions-section">
            <div class="transactions-header">
                <div class="transactions-title">
                    <i class="fas fa-receipt"></i> All Transactions
                    <span class="transactions-count" id="transactionsCount">0</span>
                </div>
            </div>
            <div class="transactions-list" id="transactionsList">
                <!-- Transactions will be loaded here -->
            </div>
            <div class="pagination" id="pagination" style="display: none;">
                <!-- Pagination will be generated here -->
            </div>
        </div>
    </div>

    <script>
        // Constants
        const ITEMS_PER_PAGE = 20;
        let allTransactions = [];
        let filteredTransactions = [];
        let currentPage = 1;
        let categories = [];

        // Check authentication
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            // Minimize filter on mobile by default
            if (window.innerWidth <= 768) {
                document.getElementById('filterSection').classList.add('minimized');
                document.getElementById('filterToggleBtn').innerHTML = '<i class="fas fa-chevron-down"></i> Show Filters';
            }

            loadData();
        });

        function showLoader() {
            document.getElementById('loader').classList.remove('hidden');
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
        }

        async function loadData() {
            showLoader();
            try {
                const token = localStorage.getItem('token');

                // Load categories
                const catResponse = await fetch('/categories', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (catResponse.ok) {
                    categories = await catResponse.json();
                    populateCategoryFilter();
                }

                // Load all transactions (incomes and expenses)
                await Promise.all([loadIncomes(), loadExpenses()]);

                // Set default date range (last 30 days) with Bangladesh timezone
                const formatter = new Intl.DateTimeFormat('en-CA', {
                    timeZone: 'Asia/Dhaka',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });

                const today = new Date();
                const thirtyDaysAgo = new Date(today);
                thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

                const todayFormatted = formatter.format(today);
                const thirtyDaysAgoFormatted = formatter.format(thirtyDaysAgo);

                document.getElementById('endDate').value = todayFormatted;
                document.getElementById('startDate').value = thirtyDaysAgoFormatted;

                applyFilters();
            } catch (error) {
                console.error('Failed to load data:', error);
            } finally {
                hideLoader();
            }
        }

        async function loadIncomes() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/incomes', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const incomes = await response.json();
                    incomes.forEach(inc => {
                        allTransactions.push({
                            id: inc.id,
                            note: inc.note || 'Income',
                            amount: parseFloat(inc.amount),
                            type: 'income',
                            categoryId: inc.categoryId,
                            categoryName: inc.categoryName || 'Income',
                            icon: inc.icon || 'coins',
                            date: inc.addedDate ? inc.addedDate.split('T')[0] : '',
                            createdAt: inc.createdAt
                        });
                    });
                }
            } catch (error) {
                console.error('Failed to load incomes:', error);
            }
        }

        async function loadExpenses() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/expenses', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const expenses = await response.json();
                    expenses.forEach(exp => {
                        allTransactions.push({
                            id: exp.id,
                            note: exp.note || 'Expense',
                            amount: parseFloat(exp.amount),
                            type: 'expense',
                            categoryId: exp.categoryId,
                            categoryName: exp.categoryName || 'Expense',
                            icon: exp.icon || 'shopping-bag',
                            date: exp.addedDate ? exp.addedDate.split('T')[0] : '',
                            createdAt: exp.createdAt
                        });
                    });
                }
            } catch (error) {
                console.error('Failed to load expenses:', error);
            }
        }

        function populateCategoryFilter() {
            const select = document.getElementById('categoryFilter');
            select.innerHTML = '<option value="all">All Categories</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name + ' (' + cat.type + ')';
                select.appendChild(option);
            });
        }

        function applyFilters() {
            const typeFilter = document.getElementById('typeFilter').value;
            const categoryFilter = document.getElementById('categoryFilter').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const searchQuery = document.getElementById('searchQuery').value.toLowerCase();
            const sortBy = document.getElementById('sortBy').value;

            // Filter transactions
            filteredTransactions = allTransactions.filter(t => {
                // Type filter
                if (typeFilter !== 'all' && t.type !== typeFilter) return false;

                // Category filter
                if (categoryFilter !== 'all' && t.categoryId != categoryFilter) return false;

                // Date filter
                if (startDate && t.date < startDate) return false;
                if (endDate && t.date > endDate) return false;

                // Search filter
                if (searchQuery && !t.note.toLowerCase().includes(searchQuery)) return false;

                return true;
            });

            // Sort transactions
            filteredTransactions.sort((a, b) => {
                switch (sortBy) {
                    case 'date-desc':
                        return new Date(b.date) - new Date(a.date);
                    case 'date-asc':
                        return new Date(a.date) - new Date(b.date);
                    case 'amount-desc':
                        return b.amount - a.amount;
                    case 'amount-asc':
                        return a.amount - b.amount;
                    default:
                        return new Date(b.date) - new Date(a.date);
                }
            });

            currentPage = 1;
            updateSummary();
            renderTransactions();
            renderPagination();
        }

        function resetFilters() {
            document.getElementById('typeFilter').value = 'all';
            document.getElementById('categoryFilter').value = 'all';
            document.getElementById('searchQuery').value = '';
            document.getElementById('sortBy').value = 'date-desc';

            // Reset with Bangladesh timezone dates
            const formatter = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Asia/Dhaka',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });

            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            const todayFormatted = formatter.format(today);
            const thirtyDaysAgoFormatted = formatter.format(thirtyDaysAgo);

            document.getElementById('endDate').value = todayFormatted;
            document.getElementById('startDate').value = thirtyDaysAgoFormatted;

            applyFilters();
        }

        function updateSummary() {
            const income = filteredTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const expense = filteredTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            const balance = income - expense;

            document.getElementById('summaryIncome').textContent = '৳' + income.toLocaleString();
            document.getElementById('summaryExpense').textContent = '৳' + expense.toLocaleString();
            document.getElementById('summaryBalance').textContent = (balance >= 0 ? '৳' : '-৳') + Math.abs(balance).toLocaleString();
            document.getElementById('summaryBalance').style.color = balance >= 0 ? 'var(--secondary)' : 'var(--danger)';
            document.getElementById('summaryCount').textContent = filteredTransactions.length;
            document.getElementById('transactionsCount').textContent = filteredTransactions.length;
        }

        function renderTransactions() {
            const container = document.getElementById('transactionsList');

            if (filteredTransactions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-receipt"></i>
                        <p>No transactions found</p>
                    </div>
                `;
                return;
            }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageTransactions = filteredTransactions.slice(startIndex, endIndex);

            container.innerHTML = pageTransactions.map(t => {
                const cat = categories.find(c => c.id == t.categoryId) || {};
                const iconColor = cat.color || (t.type === 'income' ? '#10b981' : '#ef4444');

                return `
                    <div class="transaction-item">
                        <div class="transaction-icon" style="background: ${iconColor}20; color: ${iconColor};">
                            <i class="fas fa-${t.icon}"></i>
                        </div>
                        <div class="transaction-details">
                            <div class="transaction-name">${t.note}</div>
                            <div class="transaction-meta">
                                <span><i class="fas fa-tag"></i> ${t.categoryName}</span>
                                <span><i class="fas fa-calendar"></i> ${formatDate(t.date)}</span>
                            </div>
                        </div>
                        <div class="transaction-amount ${t.type}">
                            ${t.type === 'income' ? '+' : '-'}৳${t.amount.toLocaleString()}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);

            if (totalPages <= 1) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'flex';
            let html = '';

            // Previous button
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>`;

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span>...</span>';
                }
            }

            // Next button
            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>`;

            container.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTransactions();
            renderPagination();
            document.querySelector('.transactions-list').scrollTop = 0;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Dhaka',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            return formatter.format(date);
        }

        // UTC+06:00 Bangladesh Time
        function getDatetimeWithTimezone(date = new Date()) {
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Dhaka',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            return formatter.format(date);
        }

        function formatDateWithTimezone(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Dhaka',
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            return formatter.format(date);
        }

        function toggleFilterSection() {
            const filterSection = document.getElementById('filterSection');
            const toggleBtn = document.getElementById('filterToggleBtn');

            if (filterSection.classList.contains('minimized')) {
                filterSection.classList.remove('minimized');
                toggleBtn.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Filters';
            } else {
                filterSection.classList.add('minimized');
                toggleBtn.innerHTML = '<i class="fas fa-chevron-down"></i> Show Filters';
            }
        }

        function openExportModal() {
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        function exportCSV() {
            if (filteredTransactions.length === 0) {
                alert('No transactions to export');
                return;
            }

            // Create CSV content with detailed info
            const headers = ['Date', 'Time', 'Type', 'Category', 'Note', 'Amount (৳)'];
            const rows = filteredTransactions.map(t => [
                new Date(t.date).toLocaleDateString('en-US', {timeZone: 'Asia/Dhaka'}),
                new Date(t.date).toLocaleTimeString('en-US', {timeZone: 'Asia/Dhaka'}),
                t.type.toUpperCase(),
                t.categoryName,
                t.note,
                (t.type === 'income' ? '+' : '-') + t.amount
            ]);

            let csvContent = headers.join(',') + '\n';
            rows.forEach(row => {
                csvContent += row.map(cell => `"${cell}"`).join(',') + '\n';
            });

            // Add summary
            const income = filteredTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            const expense = filteredTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expense;

            csvContent += '\n\nSummary,,,,Total Income (৳),'+income;
            csvContent += '\n,,,,Total Expense (৳),'+ expense;
            csvContent += '\n,,,,Net Balance (৳),'+ balance;
            csvContent += '\n\nExported on: ' + getDatetimeWithTimezone();
            csvContent += '\nTimezone: UTC+06:00 (Asia/Dhaka)';

            // Download file
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'transactions_' + new Date().toISOString().split('T')[0] + '.csv';
            link.click();
            closeExportModal();
        }

        async function exportPDF() {
            if (filteredTransactions.length === 0) {
                alert('No transactions to export');
                return;
            }

            try {
                const response = await fetch('/api/export/pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify({
                        transactions: filteredTransactions,
                        exportDate: getDatetimeWithTimezone()
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'transactions_' + new Date().toISOString().split('T')[0] + '.pdf';
                    link.click();
                    closeExportModal();
                } else {
                    generateClientSidePDF();
                }
            } catch (error) {
                console.log('PDF API not available, generating client-side PDF...');
                generateClientSidePDF();
            }
        }

        function generateClientSidePDF() {
            // Fallback: Generate PDF using browser print
            const printWindow = window.open('', '_blank');

            const income = filteredTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            const expense = filteredTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expense;

            let htmlContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Transactions Report</title>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 20px; color: #333; }
                        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 20px; }
                        .header h1 { margin: 0; color: #6366f1; }
                        .user-info { font-size: 12px; color: #666; margin-top: 10px; }
                        .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
                        .summary-box { padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
                        .summary-label { font-weight: bold; color: #666; margin-bottom: 5px; }
                        .summary-value { font-size: 24px; font-weight: bold; }
                        .income { color: #10b981; }
                        .expense { color: #ef4444; }
                        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        .table th { background-color: #f3f4f6; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; font-weight: bold; }
                        .table td { padding: 10px; border-bottom: 1px solid #ddd; }
                        .table tr:hover { background-color: #f9fafb; }
                        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #666; text-align: center; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>💰 Money Manager - Transaction Report</h1>
                        <div class="user-info">
                            <p>Generated on: ${getDatetimeWithTimezone()}</p>
                            <p>Timezone: UTC+06:00 (Asia/Dhaka)</p>
                        </div>
                    </div>

                    <div class="summary">
                        <div class="summary-box">
                            <div class="summary-label">Total Income</div>
                            <div class="summary-value income">৳${income.toLocaleString()}</div>
                        </div>
                        <div class="summary-box">
                            <div class="summary-label">Total Expense</div>
                            <div class="summary-value expense">৳${expense.toLocaleString()}</div>
                        </div>
                        <div class="summary-box">
                            <div class="summary-label">Net Balance</div>
                            <div class="summary-value ${balance >= 0 ? 'income' : 'expense'}">৳${Math.abs(balance).toLocaleString()}</div>
                        </div>
                    </div>

                    <table class="table">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Type</th>
                                <th>Category</th>
                                <th>Note</th>
                                <th style="text-align: right;">Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filteredTransactions.map(t => `
                                <tr>
                                    <td>${formatDateWithTimezone(t.date)}</td>
                                    <td><strong>${t.type === 'income' ? '📥 Income' : '📤 Expense'}</strong></td>
                                    <td>${t.categoryName}</td>
                                    <td>${t.note}</td>
                                    <td style="text-align: right; font-weight: bold;" class="${t.type}">
                                        ${t.type === 'income' ? '+' : '-'}৳${t.amount.toLocaleString()}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="footer">
                        <p>📊 Total Transactions: ${filteredTransactions.length}</p>
                        <p>Generated by Money Manager | All amounts in Bengali Taka (৳)</p>
                    </div>
                </body>
                </html>
            `;

            printWindow.document.write(htmlContent);
            printWindow.document.close();
            printWindow.print();
            closeExportModal();
        }

        function exportTransactions() {
            openExportModal();
        }
    </script>
</body>
</html>
